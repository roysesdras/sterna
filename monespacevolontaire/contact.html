<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- Même head -->
</head>
<body class="bg-sterna-light font-sans">
    <!-- Header identique -->

    <main class="container mx-auto px-4 py-8">
        <div class="max-w-3xl mx-auto bg-white rounded-lg shadow-md overflow-hidden">
            <div class="md:flex">
                <!-- Carte contact -->
                <div class="md:w-1/2 bg-sterna-primary text-white p-8">
                    <h1 class="text-2xl font-bold mb-6">Contactez l'équipe</h1>
                    <div class="space-y-4">
                        <div class="flex items-start">
                            <svg class="w-5 h-5 mt-1 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                            </svg>
                            <div>
                                <h3 class="font-bold">Email</h3>
                                <p>contact@sterna.africa</p>
                            </div>
                        </div>
                        <!-- Autres infos contact -->
                    </div>
                </div>

                <!-- Formulaire -->
                <div class="md:w-1/2 p-8">
                    <form>
                        <div class="mb-4">
                            <label class="block text-gray-700 text-sm font-medium mb-2">Votre nom</label>
                            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-sterna-primary">
                        </div>
                        <!-- Autres champs -->
                        <button type="submit" class="w-full bg-sterna-primary text-white py-2 px-4 rounded-md hover:bg-opacity-90 transition">
                            Envoyer le message
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer identique -->
    <!-- Scripts identiques -->
</body>
</html>
